{% load static %}

<!doctype html>
<html lang="en" data-theme="light" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Voucher Venue | {% block title %}{% endblock title %}</title>

  <link rel="icon" type="image/png" href="{% static 'favicon.png' %}" sizes="96x96">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;800;900&display=swap">

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  {% block extra_head %}{% endblock extra_head %}
</head>

<body class="is-loading">

  {% include "components/loader.html" %}
  {% include "navbar.html" %}

  <main >
    {% block content %}{% endblock %}
  </main>

  {% include "footer.html" %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <script src="{% static 'js/core.js' %}" defer></script>

  {% block scripts %}{% endblock scripts %}
</body>
</html>
